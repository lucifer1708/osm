{{define "object-rows.html"}}
{{range .Objects}}
<tr class="file-row group hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
  <td class="px-3 py-2.5 w-8">
    <input type="checkbox" class="row-checkbox w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-primary-600 focus:ring-primary-500 cursor-pointer"
      value="{{.Key}}">
  </td>
  <td class="px-4 py-2.5">
    <div class="flex items-center gap-2.5">
      <span class="text-base flex-shrink-0">{{fileIcon .Key}}</span>
      {{if .IsFolder}}
      <button
        hx-get="/buckets/{{$.Bucket}}/objects?prefix={{.Key}}"
        hx-target="#object-panel"
        hx-swap="innerHTML"
        class="text-gray-800 dark:text-gray-200 font-medium hover:text-primary-600 dark:hover:text-primary-400 transition-colors truncate max-w-xs text-left">
        {{basename .Key}}
      </button>
      {{else}}
      <button onclick="showPreviewModal('{{$.Bucket}}','{{.Key}}')"
        class="text-gray-800 dark:text-gray-200 hover:text-primary-600 dark:hover:text-primary-400 transition-colors truncate max-w-xs text-left">
        {{basename .Key}}
      </button>
      {{end}}
    </div>
  </td>
  <td class="px-4 py-2.5 text-right text-gray-500 dark:text-gray-400 text-xs whitespace-nowrap">
    {{if .IsFolder}}-{{else}}{{formatSize .Size}}{{end}}
  </td>
  <td class="px-4 py-2.5 text-right text-gray-500 dark:text-gray-400 text-xs whitespace-nowrap">
    {{formatTime .LastModified}}
  </td>
  <td class="px-4 py-2.5">
    <div class="action-btns flex items-center justify-end gap-1">
      {{if not .IsFolder}}
      <!-- Preview -->
      <button onclick="showPreviewModal('{{$.Bucket}}','{{.Key}}')"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Preview">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </button>
      <!-- Download -->
      <a href="/buckets/{{$.Bucket}}/download/{{.Key}}"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Download">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
      </a>
      <!-- Share -->
      <button onclick="showPresignModal('{{$.Bucket}}','{{.Key}}')"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Share (presign)">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
      </button>
      <!-- Copy public link -->
      <button onclick="copyPublicLink('{{$.Bucket}}','{{.Key}}')"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Copy public link">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
      </button>
      <!-- ACL / Visibility -->
      <button onclick="showACLModal('{{$.Bucket}}','{{.Key}}')"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Access Control">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
        </svg>
      </button>
      {{end}}
      {{if $.CanWrite}}
      <!-- Rename -->
      <button onclick="showRenameModal('{{$.Bucket}}','{{.Key}}','{{$.Prefix}}')"
        class="p-1.5 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-500 dark:text-gray-400" title="Rename">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </button>
      <!-- Delete -->
      <button onclick="confirmDelete('Delete &quot;{{basename .Key}}&quot;?{{if .IsFolder}} This will delete all contents inside.{{end}}', '/buckets/{{$.Bucket}}/objects/{{.Key}}?prefix={{$.Prefix}}', '#object-panel')"
        class="p-1.5 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors text-gray-500 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400" title="Delete">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
      {{end}}
    </div>
  </td>
</tr>
{{end}}
{{if .NextToken}}
<tr hx-get="/buckets/{{.Bucket}}/objects?prefix={{.Prefix}}&token={{urlEncode .NextToken}}&sort={{.SortBy}}&dir={{.SortDir}}"
    hx-trigger="revealed"
    hx-swap="outerHTML">
  <td colspan="5" class="px-4 py-4 text-center">
    <div class="flex items-center justify-center gap-2 text-xs text-gray-400 dark:text-gray-500">
      <svg class="animate-spin h-3.5 w-3.5" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      Loading more...
    </div>
  </td>
</tr>
{{end}}
{{end}}
