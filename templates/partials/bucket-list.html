{{define "bucket-list.html"}}
{{if .Toast}}
<div data-toast="{{.Toast}}" data-toast-ok="{{.ToastOK}}"></div>
{{end}}
{{if .Buckets}}
<div class="space-y-0.5">
  {{range .Buckets}}
  <div class="bucket-item group flex items-center rounded-lg cursor-pointer transition-colors hover:bg-gray-100 dark:hover:bg-gray-700"
    data-name="{{.Name}}">
    <button
      hx-get="/buckets/{{.Name}}/objects"
      hx-target="#object-panel"
      hx-swap="innerHTML"
      hx-indicator="#loading-{{.Name}}"
      class="flex-1 flex items-center gap-2.5 px-3 py-2 text-sm text-left min-w-0">
      <svg class="w-4 h-4 flex-shrink-0 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
      </svg>
      <span class="truncate text-gray-700 dark:text-gray-300 font-medium">{{.Name}}</span>
      <span id="loading-{{.Name}}" class="htmx-indicator spinner ml-auto flex-shrink-0"></span>
    </button>
    {{if $.CanManageBuckets}}
    <button
      onclick="confirmDelete('Delete bucket &quot;{{.Name}}&quot;? It must be empty.', '/buckets/{{.Name}}', '#bucket-list')"
      class="opacity-0 group-hover:opacity-100 p-1.5 mr-1 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500 transition-all flex-shrink-0"
      title="Delete bucket">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </button>
    {{end}}
  </div>
  {{end}}
</div>
{{else}}
<div class="flex flex-col items-center justify-center py-8 text-center">
  <svg class="w-8 h-8 text-gray-300 dark:text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
  </svg>
  <p class="text-xs text-gray-400 dark:text-gray-500">No buckets found</p>
  {{if .CanManageBuckets}}
  <button onclick="showCreateBucketModal()" class="mt-2 text-xs text-primary-600 dark:text-primary-400 hover:underline">Create one</button>
  {{end}}
</div>
{{end}}
{{end}}
