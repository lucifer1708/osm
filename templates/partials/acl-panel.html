{{define "acl-panel.html"}}
<div id="acl-panel-content">
  {{if .ACLError}}
  <div class="flex items-start gap-2 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 text-amber-700 dark:text-amber-400 text-xs rounded-xl px-3 py-2.5 mb-3">
    <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <span>{{.ACLError}}</span>
  </div>
  {{end}}

  <!-- Status badge -->
  <div class="flex items-center gap-2 mb-4">
    {{if .IsPublic}}
    <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-700 px-2.5 py-1 rounded-full">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg>
      Public
    </span>
    <span class="text-xs text-gray-500 dark:text-gray-400">Anyone with the link can view this file</span>
    {{else}}
    <span class="inline-flex items-center gap-1.5 text-xs font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-600 px-2.5 py-1 rounded-full">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Private
    </span>
    <span class="text-xs text-gray-500 dark:text-gray-400">Only accessible with signed URLs</span>
    {{end}}
  </div>

  {{if .IsPublic}}
  <!-- Public URL -->
  <div class="mb-4">
    <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">Public URL</label>
    <div class="flex gap-2">
      <input type="text" value="{{.PublicURL}}" readonly id="acl-pub-url"
        class="flex-1 text-xs px-3 py-2 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-lg font-mono text-gray-700 dark:text-gray-300">
      <button onclick="navigator.clipboard.writeText(document.getElementById('acl-pub-url').value).then(()=>showToast('Link copied!',true))"
        class="px-3 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-xs font-medium transition-colors flex-shrink-0">
        Copy
      </button>
    </div>
    <a href="{{.PublicURL}}" target="_blank" class="inline-flex items-center gap-1 text-xs text-primary-600 dark:text-primary-400 hover:underline mt-1.5">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      Open in new tab
    </a>
  </div>

  {{if .CanWrite}}
  <!-- Make private -->
  <form hx-post="/buckets/{{.Bucket}}/acl/{{.Key}}" hx-target="#acl-panel-content" hx-swap="outerHTML">
    <input type="hidden" name="acl" value="private">
    <button type="submit"
      class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300 text-sm rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Make Private
    </button>
  </form>
  {{end}}

  {{else}}
  {{if .CanWrite}}
  <!-- Make public -->
  <form hx-post="/buckets/{{.Bucket}}/acl/{{.Key}}" hx-target="#acl-panel-content" hx-swap="outerHTML">
    <input type="hidden" name="acl" value="public-read">
    <button type="submit"
      class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-xl transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/></svg>
      Make Public
    </button>
  </form>
  {{end}}
  {{end}}
</div>
{{end}}
