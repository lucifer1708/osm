{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ObjectStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-primary-950 to-slate-900 min-h-screen flex items-center justify-center p-4">
<style>
  .primary-950 { background-color: #0c1445; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .float { animation: float 4s ease-in-out infinite; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1e293b inset !important; -webkit-text-fill-color: #f1f5f9 !important; }
</style>

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="float inline-flex w-16 h-16 bg-gradient-to-br from-sky-400 to-blue-600 rounded-2xl items-center justify-center shadow-2xl shadow-blue-500/30 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">ObjectStore</h1>
    <p class="text-slate-400 text-sm mt-1">Sign in to your workspace</p>
  </div>

  <!-- Card -->
  <div class="bg-slate-800/70 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
    {{if .Error}}
    <div class="mb-4 flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {{.Error}}
    </div>
    {{end}}

    {{if .NoPasswordSet}}
    <div class="mb-4 flex items-start gap-2 bg-amber-500/10 border border-amber-500/30 text-amber-400 text-sm rounded-xl px-4 py-3">
      <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>No password configured. Run <code class="font-mono bg-slate-700 px-1 rounded">make gen-password</code> and add <code class="font-mono bg-slate-700 px-1 rounded">AUTH_PASSWORD_HASH</code> to your <code class="font-mono bg-slate-700 px-1 rounded">.env</code></span>
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
        <input type="text" name="username" required autofocus autocomplete="username"
          placeholder="admin"
          class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
        <div class="relative">
          <input id="pwd" type="password" name="password" required autocomplete="current-password"
            placeholder="••••••••••••"
            class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition pr-10">
          <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
            <svg id="eye" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg shadow-blue-500/20 mt-2">
        Sign In
      </button>
    </form>
  </div>
  <p class="text-center text-slate-600 text-xs mt-6">ObjectStore Manager</p>
</div>

<script>
function togglePwd() {
  const p = document.getElementById('pwd');
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
{{end}}
