{{define "totp_verify.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Factor Auth — ObjectStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] } } } }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="inline-flex w-16 h-16 bg-gradient-to-br from-violet-500 to-purple-700 rounded-2xl items-center justify-center shadow-2xl shadow-purple-500/30 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">Two-Factor Auth</h1>
    <p class="text-slate-400 text-sm mt-1">Enter the 6-digit code from your authenticator app</p>
  </div>

  <div class="bg-slate-800/70 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
    {{if .Error}}
    <div class="mb-4 flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/login/totp" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-3 text-center">Authenticator Code</label>
        <input id="code" type="text" name="code" required autofocus
          inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
          placeholder="000000"
          class="w-full px-4 py-4 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-2xl font-mono text-center tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
          oninput="if(this.value.length===6) this.form.submit()">
        <p class="text-xs text-slate-500 text-center mt-2">Code refreshes every 30 seconds</p>
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-400 hover:to-purple-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg shadow-purple-500/20">
        Verify
      </button>
      <a href="/login" class="block text-center text-sm text-slate-500 hover:text-slate-300 transition">
        ← Back to login
      </a>
    </form>
  </div>
</div>

</body>
</html>
{{end}}
