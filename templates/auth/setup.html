{{define "setup.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Admin Account — ObjectStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] } } } }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
  </script>
  <style>body { font-family:'Inter',sans-serif; } input:-webkit-autofill { -webkit-box-shadow:0 0 0 30px #1e293b inset!important; -webkit-text-fill-color:#f1f5f9!important; }</style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="inline-flex w-16 h-16 bg-gradient-to-br from-sky-400 to-blue-600 rounded-2xl items-center justify-center shadow-2xl shadow-blue-500/30 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white">Create Admin Account</h1>
    <p class="text-slate-400 text-sm mt-1">First-run setup — this page is shown only once</p>
  </div>

  <div class="bg-slate-800/70 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
    {{if .Error}}
    <div class="mb-4 flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/setup" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
        <input type="text" name="username" required autofocus autocomplete="username"
          placeholder="admin" minlength="2"
          class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
        <input type="password" name="password" required autocomplete="new-password"
          placeholder="Min 8 characters" minlength="8"
          class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Confirm Password</label>
        <input type="password" name="confirm" required autocomplete="new-password"
          placeholder="Repeat password"
          class="w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg shadow-blue-500/20 mt-2">
        Create Account
      </button>
    </form>
  </div>
  <p class="text-center text-slate-600 text-xs mt-6">You can also use <code class="font-mono">make create-user</code> from the CLI</p>
</div>

</body>
</html>
{{end}}
