services:
  osm:
    image: docker.euclidprotocol.com/osm:latest
    container_name: osm
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
      - "${FILES_PORT:-9090}:9090"
    volumes:
      # Persist SQLite database across restarts
      - osm-data:/data
    env_file:
      # Storage credentials (ENDPOINT, ACCESS_KEY, SECRET_KEY, REGION)
      # Copy .env.example to .env and fill in your values
      - .env
    environment:
      - PORT=8080
      - DB_PATH=/data/osm.db
      - FILES_PORT=9090
      # Set PUBLIC_FILES_HOST to generate correct public URLs in the UI.
      # Point your CDN/domain at this container on port 9090.
      # Example: PUBLIC_FILES_HOST=static.euclidprotocol.com
      # - PUBLIC_FILES_HOST=static.euclidprotocol.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  osm-data:
    driver: local
